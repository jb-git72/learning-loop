<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 16px;
      background: #fff;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .instructions {
      color: #666;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    textarea {
      width: 100%;
      height: 300px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      resize: vertical;
      line-height: 1.4;
    }
    textarea:focus {
      outline: none;
      border-color: #0d99ff;
      box-shadow: 0 0 0 2px rgba(13, 153, 255, 0.15);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #0d99ff;
      color: #fff;
      flex: 1;
    }
    .btn-primary:hover {
      background: #0b87e0;
    }
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.4;
      display: none;
    }
    .status.visible {
      display: block;
    }
    .status.ok {
      background: #e6f7ed;
      color: #1a7f37;
    }
    .status.err {
      background: #fef0f0;
      color: #c33;
    }
    .count {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>

  <h2>Learning Loop Ad Injector</h2>
  <p class="instructions">
    1. Select a template frame in Figma<br>
    2. Paste your ad JSON below (array of objects from <code>figma-input.json</code>)<br>
    3. Click <strong>Inject Ads</strong>
  </p>

  <textarea id="json-input" placeholder='[
  {
    "ad_id": "FT-META-001",
    "headline": "Your headline here",
    "primary_text": "Body copy...",
    "description": "Fine print",
    "cta": "Shop Now"
  }
]'></textarea>

  <div class="count" id="count"></div>

  <div class="actions">
    <button class="btn-primary" id="inject-btn">Inject Ads</button>
    <button class="btn-secondary" id="cancel-btn">Close</button>
  </div>

  <div class="status" id="status"></div>

  <script>
    const textarea = document.getElementById("json-input");
    const injectBtn = document.getElementById("inject-btn");
    const cancelBtn = document.getElementById("cancel-btn");
    const statusEl = document.getElementById("status");
    const countEl = document.getElementById("count");

    // Live count of ads in textarea
    textarea.addEventListener("input", () => {
      try {
        const data = JSON.parse(textarea.value);
        const ads = Array.isArray(data) ? data : [data];
        countEl.textContent = `${ads.length} ad(s) detected`;
      } catch {
        countEl.textContent = "";
      }
    });

    injectBtn.addEventListener("click", () => {
      const raw = textarea.value.trim();
      if (!raw) {
        showStatus("Paste ad JSON first.", true);
        return;
      }

      let data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        showStatus("Invalid JSON: " + e.message, true);
        return;
      }

      const ads = Array.isArray(data) ? data : [data];
      if (ads.length === 0) {
        showStatus("No ads found in JSON.", true);
        return;
      }

      injectBtn.disabled = true;
      showStatus(`Injecting ${ads.length} ad(s)...`, false);

      parent.postMessage({
        pluginMessage: { type: "inject", ads: ads }
      }, "*");
    });

    cancelBtn.addEventListener("click", () => {
      parent.postMessage({
        pluginMessage: { type: "cancel" }
      }, "*");
    });

    // Messages from plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "status") {
        showStatus(msg.message, msg.error);
        if (msg.message.startsWith("Done.")) {
          injectBtn.disabled = false;
        }
      }
    };

    function showStatus(text, isError) {
      statusEl.textContent = text;
      statusEl.className = "status visible " + (isError ? "err" : "ok");
    }
  </script>

</body>
</html>
